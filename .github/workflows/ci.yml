name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts:
    name: contracts (forge)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Format check
        run: forge fmt --check

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vvv
        env:
          FOUNDRY_PROFILE: ci

  packages:
    name: packages (sdk + react)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: SDK — typecheck, test, build
        run: |
          pnpm --filter @proofpoll/sdk typecheck
          pnpm --filter @proofpoll/sdk test
          pnpm --filter @proofpoll/sdk build

      - name: React — typecheck, test, build
        # Depends on the SDK's dist built in the step above.
        run: |
          pnpm --filter @proofpoll/react typecheck
          pnpm --filter @proofpoll/react test
          pnpm --filter @proofpoll/react build

      - name: Mini App — typecheck + build
        # Depends on the SDK + React dist built above.
        run: |
          pnpm --filter proofpoll-miniapp typecheck
          pnpm --filter proofpoll-miniapp build
