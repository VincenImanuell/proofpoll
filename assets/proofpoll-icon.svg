<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="ProofPoll icon">
  <defs>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5BF0A6"/>
      <stop offset="1" stop-color="#34B3A0"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0" stop-color="#16223B"/>
      <stop offset="1" stop-color="#0B1020"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="104" fill="url(#bg)"/>

  <!-- faint circuit motif -->
  <g stroke="#2BE08A" stroke-width="2.5" opacity="0.16" fill="none" stroke-linecap="round">
    <path d="M36 132 H120 L150 162"/>
    <path d="M476 162 H392 L362 192"/>
    <path d="M56 396 H140 L170 366"/>
    <path d="M456 388 H372 L342 358"/>
    <circle cx="36" cy="132" r="4.5" fill="#2BE08A" stroke="none"/>
    <circle cx="476" cy="162" r="4.5" fill="#2BE08A" stroke="none"/>
    <circle cx="56" cy="396" r="4.5" fill="#2BE08A" stroke="none"/>
  </g>

  <!-- shield + verified human -->
  <g filter="url(#glow)" fill="none" stroke="url(#green)" stroke-linejoin="round" stroke-linecap="round">
    <path d="M256 92 L374 138 V268 C374 334 320 380 256 412 C192 380 138 334 138 268 V138 Z" stroke-width="12"/>
    <circle cx="256" cy="196" r="34" stroke-width="12"/>
    <path d="M196 300 L240 344 L332 238" stroke-width="15"/>
  </g>
</svg>
