[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
remappings = ["@openzeppelin/=lib/openzeppelin-contracts/"]

[profile.ci]
verbosity = 3
fuzz = { runs = 512 }

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = true
int_types = "long"

[rpc_endpoints]
celo_sepolia = "${CELO_SEPOLIA_RPC}"
celo = "${CELO_MAINNET_RPC}"

[etherscan]
# Celo Sepolia (chain 11142220). Celoscan testnet explorer; Blockscout is a keyless alternative:
#   --verifier blockscout --verifier-url https://celo-sepolia.blockscout.com/api
celo_sepolia = { key = "${CELOSCAN_API_KEY}", url = "https://api-sepolia.celoscan.io/api", chain = 11142220 }
celo = { key = "${CELOSCAN_API_KEY}", url = "https://api.celoscan.io/api", chain = 42220 }
