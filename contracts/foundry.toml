[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
remappings = ["@openzeppelin/=lib/openzeppelin-contracts/"]

[profile.ci]
verbosity = 3
fuzz = { runs = 512 }

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = true
int_types = "long"

[rpc_endpoints]
alfajores = "${CELO_ALFAJORES_RPC}"
celo = "${CELO_MAINNET_RPC}"

[etherscan]
alfajores = { key = "${CELOSCAN_API_KEY}", url = "https://api-alfajores.celoscan.io/api", chain = 44787 }
celo = { key = "${CELOSCAN_API_KEY}", url = "https://api.celoscan.io/api", chain = 42220 }
